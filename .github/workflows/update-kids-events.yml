name: Kids event page checks

on:
  schedule:
    # GitHub cron is UTC. Two candidates cover AEST/AEDT; the local-time gate
    # keeps only Friday 08:30 Australia/Sydney, after the 07:00 Codex retry.
    - cron: "30 21,22 * * 4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-kids-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check final audit window
        id: gate
        run: node scripts/check-kids-update.mjs gate kids/data/events.json

      - name: Validate UTF-8 and JSON
        if: steps.gate.outputs.should_run == 'true'
        run: |
          node scripts/check-kids-update.mjs validate kids/data/events.json
          node scripts/check-kids-update.mjs validate kids/data/melbourne-events.json
          node scripts/check-kids-update.mjs validate-links kids/index.html

      - name: Report skipped schedule candidate
        if: steps.gate.outputs.should_run != 'true'
        run: echo "${{ steps.gate.outputs.reason }}"
