<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Industry Updates</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fff8ed;
      --ink: #22303a;
      --muted: #67727a;
      --line: rgba(70, 88, 98, 0.16);
      --panel: rgba(255, 255, 255, 0.9);
      --mint: #9bdac8;
      --peach: #ffc8a8;
      --sky: #a9d8ff;
      --lemon: #ffe89a;
      --rose: #f7b7c8;
      --lavender: #cfc3ff;
      --shadow: 0 18px 42px rgba(76, 97, 112, 0.14);
      --soft-shadow: 0 10px 28px rgba(76, 97, 112, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans SC", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app {
      min-height: 100svh;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .phone {
      position: relative;
      width: min(100%, 520px);
      min-height: 100svh;
      background: linear-gradient(180deg, #fffaf1 0%, #f3fbff 44%, #fff7fb 100%);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 11px 14px 11px 18px;
      background: rgba(255, 250, 241, 0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      min-width: 0;
      font-size: 16px;
      font-weight: 780;
      line-height: 1;
    }

    .date {
      color: var(--muted);
      font-size: 11.5px;
      white-space: nowrap;
    }

    .lang-toggle {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      width: 74px;
      height: 30px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
    }

    .lang-toggle button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 11.5px;
      font-weight: 760;
      line-height: 1;
      cursor: pointer;
    }

    .lang-toggle button.active {
      background: var(--ink);
      color: white;
    }

    .hero {
      position: relative;
      min-height: 315px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      border-bottom: 1px solid var(--line);
      background: #d9f0ff;
    }

    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.82;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.2), rgba(117, 153, 171, 0.16) 44%, rgba(34, 48, 58, 0.5));
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      padding: 24px 20px 28px;
      color: white;
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.4);
    }

    .eyebrow {
      display: none;
    }

    h1 {
      margin: 0;
      max-width: 11ch;
      font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(38px, 10vw, 54px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .deck {
      display: none;
    }

    .watermark {
      position: absolute;
      right: 14px;
      bottom: 12px;
      z-index: 2;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.64);
      font-size: 10px;
      font-weight: 760;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(20, 30, 36, 0.22);
    }

    main {
      padding: 18px 12px 34px;
    }

    section {
      margin: 0 0 24px;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 12px;
    }

    h2 {
      margin: 0;
      font-size: 20.5px;
      line-height: 1.16;
      font-weight: 820;
      letter-spacing: 0;
    }

    .count {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid rgba(70, 88, 98, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
    }

    .lead-card {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .ticker {
      display: grid;
    }

    .news-row {
      min-height: 108px;
      display: block;
      padding: 16px 13px;
      border-bottom: 1px solid var(--line);
    }

    .news-row:last-child { border-bottom: 0; }

    .topic,
    .area,
    .class-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      color: #22303a;
      font-size: 11.5px;
      font-weight: 780;
      line-height: 1;
      white-space: nowrap;
    }

    .topic.ai { background: var(--mint); }
    .topic.robot { background: var(--sky); }
    .topic.chip { background: var(--lemon); }
    .topic.trade { background: var(--peach); }
    .topic.bio { background: var(--rose); }

    .headline {
      margin: 9px 0 0;
      font-size: 16.8px;
      line-height: 1.34;
      font-weight: 780;
    }

    .summary {
      margin: 8px 0 0;
      color: #3b4a54;
      font-size: 14.5px;
      line-height: 1.72;
      font-weight: 500;
    }

    .insight-list {
      display: grid;
      gap: 12px;
    }

    .insight-item,
    .classroom {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      padding: 16px 14px;
    }

    .area {
      margin: 0 0 9px;
      background: rgba(155, 218, 200, 0.46);
      color: #28745f;
      font-weight: 820;
    }

    .signal,
    .class-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.36;
      font-weight: 790;
    }

    .why {
      margin: 10px 0 0;
      padding: 10px 11px;
      border-radius: 8px;
      background: rgba(169, 216, 255, 0.22);
      color: #3b4a54;
      font-size: 13.8px;
      line-height: 1.62;
      font-weight: 500;
    }

    .ref {
      margin: 12px 0 0;
      padding-top: 9px;
      border-top: 1px solid rgba(70, 88, 98, 0.1);
      color: var(--muted);
      font-size: 11.2px;
      line-height: 1.48;
      font-weight: 520;
    }

    .classroom {
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--soft-shadow);
    }

    .class-label {
      margin: 0 0 9px;
      background: rgba(255, 232, 154, 0.6);
      color: #746124;
      font-weight: 820;
    }

    .class-title {
      color: var(--ink);
    }

    .class-text {
      margin: 8px 0 0;
      color: #3b4a54;
      font-size: 14.5px;
      line-height: 1.72;
      font-weight: 500;
    }

    html[lang="zh-CN"] .summary,
    html[lang="zh-CN"] .why,
    html[lang="zh-CN"] .class-text {
      text-align: justify;
      text-align-last: left;
      text-justify: inter-ideograph;
      word-break: normal;
      overflow-wrap: break-word;
    }

    html[lang="en"] .summary,
    html[lang="en"] .why,
    html[lang="en"] .class-text {
      text-align: justify;
      text-align-last: left;
      hyphens: none;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .footer-note {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 18px 22px;
    }

    .signature {
      margin: 0;
      padding: 0 18px 16px;
      text-align: center;
      color: rgba(22, 22, 22, 0.28);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 370px) {
      header {
        grid-template-columns: 1fr auto;
      }

      .date {
        display: none;
      }

      .news-row {
        padding-inline: 11px;
      }
    }

    @media (min-width: 780px) {
      .app {
        padding: 28px 0;
      }

      .phone {
        min-height: auto;
        border-radius: 18px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="phone">
      <header>
        <div class="brand">Industry Updates</div>
        <div class="date" id="today">Loading</div>
        <div class="lang-toggle" aria-label="Language switch">
          <button type="button" id="langZh" class="active">中</button>
          <button type="button" id="langEn">EN</button>
        </div>
      </header>

      <article class="hero">
        <img src="industry-cover.png" alt="Structural engineering and technology industry cover">
        <div class="hero-copy">
          <p class="eyebrow" id="edition">晨间简报</p>
          <h1 id="heroTitle">Daily Intelligence</h1>
          <p class="deck" id="heroDeck">实时行业消息、面向结构工程未来的专业洞察，以及一条跨规范设计知识点。</p>
        </div>
        <div class="watermark">SConmyway</div>
      </article>

      <main>
        <section>
          <div class="section-head">
            <h2 id="liveTitle">实时消息</h2>
            <span class="count" id="liveCount">3 updates</span>
          </div>
          <div class="lead-card ticker" id="liveUpdates"></div>
        </section>

        <section>
          <div class="section-head">
            <h2 id="insightTitle">专业趋势洞察</h2>
            <span class="count" id="insightCount">3 insights</span>
          </div>
          <div class="insight-list" id="insights"></div>
        </section>

        <section>
          <div class="section-head">
            <h2 id="classroomTitle">每日知识课堂</h2>
          </div>
          <div class="classroom" id="classroom"></div>
        </section>
      </main>

      <p class="footer-note" id="footerNote">页面数据来自 daily-data.json。每日自动任务会更新同一入口。</p>
      <p class="signature">SConmyway</p>
    </div>
  </div>

  <script>
    const fallback = {
      "date": "2026-06-19",
      "edition": {
        "zh": "晨间简报",
        "en": "Morning Brief"
      },
      "liveUpdates": [
        {
          "topic": {
            "zh": "AI",
            "en": "AI"
          },
          "title": {
            "zh": "企业AI智能体进入并购加速期",
            "en": "Enterprise AI agents enter an M&A phase"
          },
          "summary": {
            "zh": "Salesforce以36亿美元收购AI客服智能体公司Fin，说明企业软件竞争正在从“加AI功能”转向“买下可落地的智能体流程”。短期看客服、销售和知识库会最先被重塑，长期看SaaS公司必须证明AI能带来可计量结果。",
            "en": "Salesforce's $3.6 billion deal for AI agent maker Fin shows enterprise software moving from adding AI features to owning deployable agent workflows. Customer support, sales, and knowledge bases are likely to change first."
          },
          "reference": "Investor's Business Daily, Salesforce-Fin acquisition coverage, June 2026"
        },
        {
          "topic": {
            "zh": "机器人",
            "en": "Robotics"
          },
          "title": {
            "zh": "人形机器人从展示走向产线验证",
            "en": "Humanoids move toward factory validation"
          },
          "summary": {
            "zh": "人形机器人热点正在从发布会演示转向真实产线和供应链验证。Tesla披露Optimus产线准备，Nvidia与制造伙伴也被报道探索机器人参与AI服务器生产。真正关键不只是能走能拿，而是稳定性、维护成本和任务复用率。",
            "en": "Humanoid robotics is shifting from demonstrations toward production-line validation. Tesla has discussed Optimus production preparation, while Nvidia-linked manufacturing plans point to robots entering server assembly."
          },
          "reference": "Tesla Q1 2026 Update; Reuters reporting cited by TechRadar on Nvidia-Foxconn humanoid deployment"
        },
        {
          "topic": {
            "zh": "加密货币",
            "en": "Crypto"
          },
          "title": {
            "zh": "稳定币与CBDC竞争进入政治层面",
            "en": "Stablecoins and CBDCs become political"
          },
          "summary": {
            "zh": "英国围绕“Britcoin”的争论显示，央行数字货币和私人稳定币的竞争已经不只是技术问题。监管、隐私、支付主权和利益冲突会一起进入公共讨论。对行业来说，合规可信度可能比短期交易热度更重要。",
            "en": "The UK debate over Britcoin shows that CBDCs and private stablecoins are no longer just technical payment tools. Regulation, privacy, monetary sovereignty, and conflicts of interest are becoming central issues."
          },
          "reference": "The Guardian, Britcoin and stablecoin politics, June 18 2026; Bank of England stablecoin policy materials"
        }
      ],
      "insights": [
        {
          "area": {
            "zh": "结构可靠度",
            "en": "Structural Reliability"
          },
          "title": {
            "zh": "数字孪生正在向“风险孪生”演化",
            "en": "Digital twins evolve toward risk twins"
          },
          "summary": {
            "zh": "结构数字孪生的重点正在从可视化模型转向风险更新：传感器数据、贝叶斯推断、模型误差和构件可靠指标被放进同一套实时框架。对结构工程师来说，这意味着未来的监测系统不能只回答“有没有损伤”，还要回答“风险是否变化、是否需要限载、何时维护最划算”。如果你想往可靠度和智慧基础设施方向发展，概率建模、结构动力学、传感数据清洗和决策分析会越来越像一组技能，而不是互相分开的课程。",
            "en": "Structural digital twins are moving from visualization toward risk updating, where sensor data, Bayesian inference, model error, and component reliability indices sit in one real-time framework. Future monitoring systems must answer not only whether damage exists, but whether risk has changed, whether load limits are needed, and when maintenance is economically justified."
          },
          "why": {
            "zh": "建议把可靠度、贝叶斯更新和结构健康监测作为一个组合方向学习。",
            "en": "Study reliability, Bayesian updating, and structural health monitoring as one connected track."
          },
          "reference": "Risk Twin: Real-time Risk Visualization and Control for Structural Systems; A Digital Twin Framework for Civil Engineering Structures; Structural Safety"
        },
        {
          "area": {
            "zh": "新型材料",
            "en": "Advanced Materials"
          },
          "title": {
            "zh": "UHPC设计焦点从强度转向延性",
            "en": "UHPC design shifts from strength to ductility"
          },
          "summary": {
            "zh": "UHPC的高强度和裂后性能让它很适合桥梁、加固和薄壁构件，但研究也提醒：预应力UHPC梁可能在裂缝局部化后快速失效，预警不足。行业下一步不只是追求更高抗压强度，而是控制配筋、预应力、截面和拉伸软化行为，让构件出现可识别、可设计的延性破坏。对你来说，材料创新要和极限状态设计、失效模式识别、施工质量控制一起理解，才会变成真正可用的工程判断。",
            "en": "UHPC's high strength and post-cracking performance make it attractive for bridges, retrofit, and thin members, but research on prestressed UHPC beams warns that crack localization can lead to rapid failure with limited warning. The design focus is shifting toward reinforcement configuration, prestress level, section proportion, and tensile behavior that promote ductile failure modes."
          },
          "why": {
            "zh": "材料方向要从“性能很强”进一步学到“失效模式是否可控”。",
            "en": "Move from asking whether a material is strong to whether its failure mode is controllable."
          },
          "reference": "Flexural Behavior and Design of Prestressed UHPC Beams, 2024; Cement and Concrete Composites; Construction and Building Materials"
        },
        {
          "area": {
            "zh": "AI与计算",
            "en": "AI & Computation"
          },
          "title": {
            "zh": "AI辅助有限元要重视不确定性",
            "en": "AI-assisted FEA needs uncertainty control"
          },
          "summary": {
            "zh": "AI和代理模型能显著降低有限元参数研究成本，但工程优化里的关键风险是“低成本预测看起来很准，实际却落在训练数据之外”。近期多智能体FEA-AI混合优化研究强调，用AI生成方案、用代理模型筛选，再把高不确定性或关键候选点送回高保真有限元校核。这个思路对结构工程也很有启发：未来AI不是替代结构判断，而是帮助你更快探索设计空间，同时必须保留可靠度、规范边界和高保真校核。",
            "en": "AI and surrogate models can reduce the cost of finite-element studies, but the central risk is confident-looking prediction outside the training domain. Recent FEA-AI hybrid optimization work uses agents to define problems, surrogates to screen candidates, and high-fidelity FEA to correct uncertain or critical options. The same logic applies to structural engineering."
          },
          "why": {
            "zh": "有限元、Python、代理模型和不确定性量化值得一起练。",
            "en": "Practice finite elements, Python, surrogate modeling, and uncertainty quantification together."
          },
          "reference": "A Multi-Agent System for IPMSM Design Optimization via an FEA-AI Hybrid Approach, 2026; Reliability Engineering & System Safety"
        }
      ],
      "classroom": {
        "title": {
          "zh": "荷载组合里的分项系数差异",
          "en": "Partial Factors in Load Combinations"
        },
        "text": {
          "zh": "中国、澳洲、美国和欧洲规范都会把永久荷载、可变荷载、风荷载和地震作用组合起来，但背后的安全表达不同。中国GB体系和澳洲AS体系常用极限状态设计与分项系数组合；美国ASCE 7/AISC常见LRFD与ASD两套表达；欧洲Eurocode使用作用分项系数、组合系数和材料分项系数配合。跨规范比较时不能只看某个1.2或1.5是否相近，还要同时看目标可靠指标、荷载统计来源、组合系数、材料抗力折减和服务性限值。",
          "en": "Chinese, Australian, US, and European codes all combine permanent, variable, wind, and seismic actions, but their safety formats differ. China and Australia commonly use limit-state combinations with partial factors; the US often presents LRFD and ASD formats through ASCE 7 and AISC; Europe combines action factors, combination factors, and material partial factors under Eurocode. Similar-looking numbers are not enough: target reliability, load statistics, combination factors, resistance factors, and serviceability limits must be read together."
        },
        "references": "GB 50009; AS/NZS 1170; ASCE 7; AISC 360; EN 1990 / Eurocode Basis of Structural Design"
      }
    };

    const copy = {
      zh: {
        htmlLang: "zh-CN",
        dateLocale: "zh-CN",
        heroTitle: "今日行业观察",
        heroDeck: "实时行业消息、面向结构工程未来的专业洞察，以及一条跨规范设计知识点。",
        liveTitle: "实时消息",
        liveCount: "3 updates",
        insightTitle: "专业趋势洞察",
        insightCount: "3 insights",
        classroomTitle: "每日知识课堂",
        classroomLabel: "设计对比",
        whyLabel: "对你意味着什么",
        refLabel: "Reference",
        footer: "页面数据来自 daily-data.json。每日自动任务会更新同一入口。"
      },
      en: {
        htmlLang: "en",
        dateLocale: "en-AU",
        heroTitle: "Industry Briefing",
        heroDeck: "Industry signals, future-facing structural engineering insight, and one cross-code design lesson.",
        liveTitle: "Live Updates",
        liveCount: "3 updates",
        insightTitle: "Professional Trend Insight",
        insightCount: "3 insights",
        classroomTitle: "Daily Classroom",
        classroomLabel: "Design Note",
        whyLabel: "Why it matters to you",
        refLabel: "Reference",
        footer: "Data comes from daily-data.json. The daily automation updates the same page."
      }
    };

    const topicClass = {
      "AI": "ai",
      "机器人": "robot",
      "Robotics": "robot",
      "半导体": "chip",
      "Chips": "chip",
      "跨境电商": "trade",
      "Commerce": "trade",
      "生物医药": "bio",
      "Biotech": "bio"
    };

    let dailyData = fallback;
    let lang = localStorage.getItem("industryUpdatesLang") || "zh";

    function pick(value) {
      if (!value || typeof value === "string") return value || "";
      return value[lang] || value.zh || value.en || "";
    }

    async function loadData() {
      try {
        const response = await fetch("daily-data.json", { cache: "no-store" });
        if (!response.ok) throw new Error("Cannot load daily data");
        return await response.json();
      } catch {
        return fallback;
      }
    }

    function formatDate(value) {
      const date = new Date(`${value}T08:00:00`);
      return new Intl.DateTimeFormat(copy[lang].dateLocale, {
        month: "short",
        day: "numeric",
        weekday: "short"
      }).format(date);
    }

    function renderLive(items) {
      document.querySelector("#liveUpdates").innerHTML = items.map(item => {
        const topic = pick(item.topic);
        return `
          <div class="news-row">
            <span class="topic ${topicClass[topic] || "chip"}">${topic}</span>
            <div>
              <p class="headline">${pick(item.title || item.text)}</p>
              <p class="summary">${pick(item.summary)}</p>
              <p class="ref">${copy[lang].refLabel}: ${item.reference || item.source || ""}</p>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderInsights(items) {
      document.querySelector("#insights").innerHTML = items.map(item => `
        <article class="insight-item">
          <p class="area">${pick(item.area)}</p>
          <p class="signal">${pick(item.title || item.signal)}</p>
          <p class="summary">${pick(item.summary)}</p>
          <p class="why"><strong>${copy[lang].whyLabel}:</strong> ${pick(item.why)}</p>
          <p class="ref">${copy[lang].refLabel}: ${item.reference}</p>
        </article>
      `).join("");
    }

    function renderClassroom(item) {
      document.querySelector("#classroom").innerHTML = `
        <p class="class-label">${copy[lang].classroomLabel}</p>
        <h3 class="class-title">${pick(item.title)}</h3>
        <p class="class-text">${pick(item.text)}</p>
        <p class="ref">${copy[lang].refLabel}: ${item.references}</p>
      `;
    }

    function setLanguage(nextLang) {
      lang = nextLang;
      localStorage.setItem("industryUpdatesLang", lang);
      document.documentElement.lang = copy[lang].htmlLang;
      document.querySelector("#langZh").classList.toggle("active", lang === "zh");
      document.querySelector("#langEn").classList.toggle("active", lang === "en");
      render();
    }

    function render() {
      document.querySelector("#today").textContent = formatDate(dailyData.date);
      document.querySelector("#edition").textContent = pick(dailyData.edition);
      document.querySelector("#heroTitle").textContent = copy[lang].heroTitle;
      document.querySelector("#heroDeck").textContent = copy[lang].heroDeck;
      document.querySelector("#liveTitle").textContent = copy[lang].liveTitle;
      document.querySelector("#liveCount").textContent = copy[lang].liveCount;
      document.querySelector("#insightTitle").textContent = copy[lang].insightTitle;
      document.querySelector("#insightCount").textContent = copy[lang].insightCount;
      document.querySelector("#classroomTitle").textContent = copy[lang].classroomTitle;
      document.querySelector("#footerNote").textContent = copy[lang].footer;
      renderLive(dailyData.liveUpdates || []);
      renderInsights(dailyData.insights || dailyData.technical || []);
      renderClassroom(dailyData.classroom || fallback.classroom);
    }

    document.querySelector("#langZh").addEventListener("click", () => setLanguage("zh"));
    document.querySelector("#langEn").addEventListener("click", () => setLanguage("en"));

    loadData().then(data => {
      dailyData = data;
      setLanguage(lang);
    });
  </script>
</body>
</html>
