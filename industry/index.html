<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Industry Updates</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fff8ed;
      --ink: #22303a;
      --muted: #67727a;
      --line: rgba(70, 88, 98, 0.16);
      --panel: rgba(255, 255, 255, 0.9);
      --mint: #9bdac8;
      --peach: #ffc8a8;
      --sky: #a9d8ff;
      --lemon: #ffe89a;
      --rose: #f7b7c8;
      --lavender: #cfc3ff;
      --shadow: 0 18px 42px rgba(76, 97, 112, 0.14);
      --soft-shadow: 0 10px 28px rgba(76, 97, 112, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans SC", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app {
      min-height: 100svh;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .phone {
      position: relative;
      width: min(100%, 520px);
      min-height: 100svh;
      background: linear-gradient(180deg, #fffaf1 0%, #f3fbff 44%, #fff7fb 100%);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 11px 14px 11px 18px;
      background: rgba(255, 250, 241, 0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      min-width: 0;
      font-size: 16px;
      font-weight: 780;
      line-height: 1;
    }

    .date {
      color: var(--muted);
      font-size: 11.5px;
      white-space: nowrap;
    }

    .lang-toggle {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      width: 74px;
      height: 30px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
    }

    .lang-toggle button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 11.5px;
      font-weight: 760;
      line-height: 1;
      cursor: pointer;
    }

    .lang-toggle button.active {
      background: var(--ink);
      color: white;
    }

    .hero {
      position: relative;
      min-height: 315px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      border-bottom: 1px solid var(--line);
      background: #d9f0ff;
    }

    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.82;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.2), rgba(117, 153, 171, 0.16) 44%, rgba(34, 48, 58, 0.5));
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      padding: 24px 20px 28px;
      color: white;
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.4);
    }

    .eyebrow {
      display: none;
    }

    h1 {
      margin: 0;
      max-width: 11ch;
      font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(38px, 10vw, 54px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .deck {
      display: none;
    }

    .watermark {
      position: absolute;
      right: 14px;
      bottom: 12px;
      z-index: 2;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.64);
      font-size: 10px;
      font-weight: 760;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(20, 30, 36, 0.22);
    }

    main {
      padding: 18px 12px 34px;
    }

    section {
      margin: 0 0 24px;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 12px;
    }

    h2 {
      margin: 0;
      font-size: 20.5px;
      line-height: 1.16;
      font-weight: 820;
      letter-spacing: 0;
    }

    .count {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid rgba(70, 88, 98, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
    }

    .lead-card {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .ticker {
      display: grid;
    }

    .news-row {
      min-height: 108px;
      display: block;
      padding: 16px 13px;
      border-bottom: 1px solid var(--line);
    }

    .news-row:last-child { border-bottom: 0; }

    .topic,
    .area,
    .class-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      color: #22303a;
      font-size: 11.5px;
      font-weight: 780;
      line-height: 1;
      white-space: nowrap;
    }

    .topic.ai { background: var(--mint); }
    .topic.robot { background: var(--sky); }
    .topic.chip { background: var(--lemon); }
    .topic.trade { background: var(--peach); }
    .topic.bio { background: var(--rose); }
    .topic.crypto { background: var(--lavender); }

    .headline {
      margin: 9px 0 0;
      font-size: 16.8px;
      line-height: 1.34;
      font-weight: 780;
    }

    .summary {
      margin: 8px 0 0;
      color: #3b4a54;
      font-size: 14.5px;
      line-height: 1.72;
      font-weight: 500;
    }

    .watch {
      margin: 10px 0 0;
      padding-left: 10px;
      border-left: 2px solid rgba(169, 216, 255, 0.92);
      color: #53636c;
      font-size: 13px;
      line-height: 1.62;
      font-weight: 500;
    }

    .insight-list {
      display: grid;
      gap: 12px;
    }

    .insight-item,
    .classroom {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      padding: 16px 14px;
    }

    .area {
      margin: 0 0 9px;
      background: rgba(155, 218, 200, 0.46);
      color: #28745f;
      font-weight: 820;
    }

    .signal,
    .class-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.36;
      font-weight: 790;
    }

    .why {
      margin: 10px 0 0;
      padding: 10px 11px;
      border-radius: 8px;
      background: rgba(169, 216, 255, 0.22);
      color: #3b4a54;
      font-size: 13.8px;
      line-height: 1.62;
      font-weight: 500;
    }

    .evidence,
    .caveat {
      margin: 9px 0 0;
      color: #5c6d76;
      font-size: 12.7px;
      line-height: 1.62;
      font-weight: 500;
    }

    .evidence {
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(70, 88, 98, 0.08);
    }

    .caveat {
      padding-left: 10px;
      border-left: 2px solid rgba(255, 192, 122, 0.82);
    }

    .ref {
      margin: 12px 0 0;
      padding-top: 9px;
      border-top: 1px solid rgba(70, 88, 98, 0.1);
      color: var(--muted);
      font-size: 11.2px;
      line-height: 1.48;
      font-weight: 520;
    }

    .ref-label {
      font-weight: 720;
    }

    .ref-links {
      display: inline;
    }

    .ref-link {
      color: #2d7081;
      text-decoration: underline;
      text-decoration-color: rgba(45, 112, 129, 0.34);
      text-underline-offset: 2px;
      overflow-wrap: anywhere;
    }

    .ref-link:hover,
    .ref-link:focus-visible {
      color: #15576a;
      text-decoration-color: currentColor;
    }

    .ref-separator {
      color: rgba(79, 95, 104, 0.52);
    }

    .classroom {
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--soft-shadow);
    }

    .class-label {
      margin: 0 0 9px;
      background: rgba(255, 232, 154, 0.6);
      color: #746124;
      font-weight: 820;
    }

    .class-title {
      color: var(--ink);
      font-size: 18px;
      line-height: 1.38;
      font-weight: 820;
    }

    .class-text {
      margin: 8px 0 0;
      color: #3b4a54;
      font-size: 14.5px;
      line-height: 1.72;
      font-weight: 500;
    }

    .compare-title {
      margin: 18px 0 6px;
      color: #5f6f77;
      font-size: 12.2px;
      line-height: 1.45;
      font-weight: 820;
    }

    .compare-list {
      margin-top: 2px;
      border-top: 1px solid rgba(70, 88, 98, 0.1);
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(78px, 104px) 1fr;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(70, 88, 98, 0.1);
    }

    .compare-key,
    .compare-copy {
      margin: 0;
    }

    .compare-key {
      color: #28745f;
      font-size: 12.5px;
      line-height: 1.55;
      font-weight: 800;
    }

    .compare-copy {
      color: #3b4a54;
      font-size: 14.2px;
      line-height: 1.72;
      font-weight: 500;
    }

    .design-takeaway {
      margin: 14px 0 0;
      padding: 11px 12px;
      border-left: 4px solid rgba(255, 192, 122, 0.92);
      background: rgba(255, 232, 154, 0.22);
    }

    .design-takeaway-label,
    .design-takeaway-text {
      margin: 0;
    }

    .design-takeaway-label {
      color: #746124;
      font-size: 12px;
      line-height: 1.4;
      font-weight: 850;
    }

    .design-takeaway-text {
      margin-top: 5px;
      color: #3b4a54;
      font-size: 14.2px;
      line-height: 1.72;
      font-weight: 560;
    }

    .example-block {
      margin: 18px -14px 0;
      padding: 18px 14px 7px;
      border-top: 2px solid rgba(91, 169, 194, 0.38);
      background: rgba(169, 216, 255, 0.17);
    }

    .example-label {
      margin: 0 0 10px;
    }

    .example-title {
      margin: 0;
      color: #183744;
      font-size: 17px;
      line-height: 1.4;
      font-weight: 800;
    }

    .example-intro {
      margin: 10px 0 0;
      color: #4c5d66;
      font-size: 14.2px;
      line-height: 1.72;
      font-weight: 500;
    }

    .equation-list {
      margin-top: 14px;
      border-top: 1px solid rgba(44, 95, 112, 0.15);
    }

    .equation-row {
      display: grid;
      grid-template-columns: minmax(96px, 124px) minmax(0, 1fr);
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(44, 95, 112, 0.13);
    }

    .equation-key,
    .equation-result {
      margin: 0;
    }

    .equation-key {
      padding-top: 9px;
      color: #236479;
      font-size: 12.8px;
      line-height: 1.55;
      font-weight: 820;
    }

    .equation-body {
      min-width: 0;
    }

    .equation-formula {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid rgba(70, 139, 160, 0.24);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.94);
      color: #143746;
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      font-size: 16.2px;
      line-height: 1.5;
      font-weight: 650;
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      overflow-wrap: normal;
      word-break: normal;
      -webkit-overflow-scrolling: touch;
    }

    .math-var {
      font-style: italic;
    }

    .equation-formula sub,
    .equation-formula sup {
      position: relative;
      vertical-align: baseline;
      font-size: 0.68em;
      line-height: 0;
    }

    .equation-formula sub {
      bottom: -0.28em;
    }

    .equation-formula sup {
      top: -0.48em;
    }

    .equation-result {
      margin-top: 8px;
      color: #4c5d66;
      font-size: 14.2px;
      line-height: 1.72;
      font-weight: 500;
    }

    .equation-citation {
      margin: 8px 2px 0;
      padding-left: 9px;
      border-left: 3px solid rgba(91, 169, 194, 0.45);
      color: #4c6a73;
      font-size: 11.8px;
      line-height: 1.55;
      font-weight: 620;
    }

    .example-conclusion {
      margin: 15px 0 8px;
      padding: 12px 12px 12px 13px;
      border-left: 4px solid #5ba9c2;
      background: rgba(255, 255, 255, 0.72);
    }

    .example-conclusion-label,
    .example-conclusion-text {
      margin: 0;
    }

    .example-conclusion-label {
      color: #236479;
      font-size: 12px;
      line-height: 1.4;
      font-weight: 850;
    }

    .example-conclusion-text {
      margin-top: 5px;
      color: #29444f;
      font-size: 14.2px;
      line-height: 1.72;
      font-weight: 620;
    }

    .classroom .ref {
      font-size: 12px;
      line-height: 1.62;
      font-weight: 560;
    }

    .classroom .ref-link {
      font-weight: 650;
    }

    html[lang="zh-CN"] .summary,
    html[lang="zh-CN"] .why,
    html[lang="zh-CN"] .watch,
    html[lang="zh-CN"] .evidence,
    html[lang="zh-CN"] .caveat,
    html[lang="zh-CN"] .class-text,
    html[lang="zh-CN"] .compare-copy,
    html[lang="zh-CN"] .design-takeaway-text,
    html[lang="zh-CN"] .example-intro,
    html[lang="zh-CN"] .equation-result,
    html[lang="zh-CN"] .example-conclusion-text {
      text-align: justify;
      text-align-last: left;
      text-justify: inter-ideograph;
      word-break: normal;
      overflow-wrap: break-word;
    }

    html[lang="en"] .summary,
    html[lang="en"] .why,
    html[lang="en"] .watch,
    html[lang="en"] .evidence,
    html[lang="en"] .caveat,
    html[lang="en"] .class-text,
    html[lang="en"] .compare-copy,
    html[lang="en"] .design-takeaway-text,
    html[lang="en"] .example-intro,
    html[lang="en"] .equation-result,
    html[lang="en"] .example-conclusion-text {
      text-align: justify;
      text-align-last: left;
      hyphens: none;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .footer-note {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 18px 22px;
    }

    .signature {
      margin: 0;
      padding: 0 18px 16px;
      text-align: center;
      color: rgba(22, 22, 22, 0.28);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      .compare-row,
      .equation-row {
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .equation-key {
        padding-top: 0;
      }
    }

    @media (max-width: 370px) {
      header {
        grid-template-columns: 1fr auto;
      }

      .date {
        display: none;
      }

      .news-row {
        padding-inline: 11px;
      }
    }

    @media (min-width: 780px) {
      .app {
        padding: 28px 0;
      }

      .phone {
        min-height: auto;
        border-radius: 18px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="phone">
      <header>
        <div class="brand">Industry Updates</div>
        <div class="date" id="today">Loading</div>
        <div class="lang-toggle" aria-label="Language switch">
          <button type="button" id="langZh" class="active">中</button>
          <button type="button" id="langEn">EN</button>
        </div>
      </header>

      <article class="hero">
        <img src="industry-cover.png" alt="Industry briefing cover">
        <div class="hero-copy">
          <p class="eyebrow" id="edition">晨间简报</p>
          <h1 id="heroTitle">今日行业观察</h1>
          <p class="deck" id="heroDeck">实时行业消息、结构工程视角的职业洞察，以及一条跨规范课堂笔记。</p>
        </div>
        <div class="watermark">SConmyway</div>
      </article>

      <main>
        <section>
          <div class="section-head">
            <h2 id="liveTitle">实时消息</h2>
            <span class="count" id="liveCount">3 updates</span>
          </div>
          <div class="lead-card ticker" id="liveUpdates"></div>
        </section>

        <section>
          <div class="section-head">
            <h2 id="insightTitle">专业趋势洞察</h2>
            <span class="count" id="insightCount">3 insights</span>
          </div>
          <div class="insight-list" id="insights"></div>
        </section>

        <section>
          <div class="section-head">
            <h2 id="classroomTitle">中外设计课堂</h2>
          </div>
          <div class="classroom" id="classroom"></div>
        </section>
      </main>

      <p class="footer-note" id="footerNote">内容每日更新，资料来源见各条 Reference。</p>
      <p class="signature">SConmyway</p>
    </div>
  </div>

            "title": {
                  "zh": "疲劳设计不是把强度再折减一次：为什么应力幅、循环次数和细部类别决定钢结构寿命？",
                  "en": "Fatigue design is not another strength reduction: why stress range, cycle count, and detail category govern steel life"
            },
            "text": {
                  "zh": "疲劳关注的是重复作用下裂纹如何在细部位置萌生和扩展。普通强度设计通常比较一次或少数几次极端作用下的作用效应和抗力；疲劳设计则关心许多次较小应力循环的累积损伤。对钢桥、吊车梁、桅杆、塔架、振动设备支座和焊接连接而言，名义应力可能远低于屈服强度，但焊趾、孔边、横向附件和几何突变处仍可能因应力幅反复变化而开裂。中国、澳洲、美国和欧洲体系看起来不同：GB 50017把钢结构疲劳作为不同于一般极限状态的疲劳验算；AS 4100和AS/NZS 5100.6使用结构钢和桥梁钢构件的疲劳类别与细部控制；AASHTO LRFD用细部类别常数、应力循环次数和疲劳阈值表达桥梁细部抗疲劳能力；Eurocode 3用detail category、等效应力幅和疲劳分项系数组织验算。跨规范复核时，关键不是简单比较一个允许应力数值，而是确认应力幅定义、循环统计、细部类别、焊接质量、剩余压应力、检测可达性和服役谱是否一致。",
                  "en": "Fatigue asks how cracks initiate and grow at details under repeated action. Ordinary strength design usually compares action effect and resistance under one or a few extreme events; fatigue design is about cumulative damage from many smaller stress cycles. For steel bridges, crane girders, masts, towers, vibrating-equipment supports, and welded connections, nominal stress may remain far below yield, yet weld toes, hole edges, transverse attachments, and geometric discontinuities can crack under repeated stress range. Chinese, Australian, US, and European systems express this differently. GB 50017 treats fatigue checking differently from general limit-state design. AS 4100 and AS/NZS 5100.6 use fatigue categories and detailing controls for steel structures and bridges. AASHTO LRFD expresses bridge fatigue resistance through detail-category constants, cycle count, and threshold stress range. Eurocode 3 organises checking around detail category, equivalent stress range, and fatigue partial factors. In cross-code review, the key is not to compare one allowable stress number; it is to align stress-range definition, cycle counting, detail category, weld quality, residual stress assumptions, inspection access, and the service load spectrum."

                              "en": "Fatigue cracking is driven by repeated variation, so the design quantity is usually the range between maximum and minimum stress. Two members can have the same maximum stress, but the one experiencing many larger stress-range cycles has higher fatigue risk."

                        "label": {
                              "zh": "细部类别代表裂纹位置",
                              "en": "Detail category represents crack location"

                        "text": {

                                          "sub": "i"
                                    },

                        "en": "The 35 MPa example only illustrates stress range. Real fatigue life depends on detail category, weld quality, residual stress, plate thickness, corrosion, dynamic amplification, traffic growth, inspection interval, and whether cracks have already initiated. For existing structures with suspected fatigue, the review should combine field NDT, fracture-critical detail identification, and remaining-life assessment rather than relying only on new-design tables."

            "references": [
                  "FHWA, LRFD steel girder superstructure design example, AASHTO fatigue Articles 6.6.1.2.5-1 and 6.6.1.2.5-2.",
                  "EN 1993-1-9:2005, Eurocode 3: Design of steel structures, fatigue detail categories and stress-range verification.",
                  "GB 50017-2017, Code for design of steel structures, general design requirements and fatigue design distinction.",
                  "Australian Steel Institute, AS 4100:2020 key standards update; Austroads, AS/NZS 5100.6 bridge steel and composite construction overview."

            "referenceLinks": [
                  {
                        "label": "FHWA: AASHTO LRFD steel girder fatigue example",

                        "url": "https://standards.iteh.ai/catalog/standards/sist/77a3e59f-4a40-44dd-9a12-e7204c80b89f/sist-en-1993-1-9-2005"
                  },
                  {
                        "label": "GB 50017-2017 public standard summary",
                        "url": "https://www.codeofchina.com/standard/GB50017-2017.html"

                  {

                  {

}
    const copy = {
      zh: {
        htmlLang: "zh-CN",
        dateLocale: "zh-CN",
        heroTitle: "今日行业观察",
        heroDeck: "实时行业消息、结构工程视角的职业洞察，以及一条跨规范课堂笔记。",
        liveTitle: "实时消息",
        liveCount: "3 updates",
        insightTitle: "专业趋势洞察",
        insightCount: "3 insights",
        classroomTitle: "中外设计课堂",
        classroomLabel: "工程对比",
        comparisonLabel: "对比拆解",
        takeawayLabel: "设计提醒",
        watchLabel: "下一步观察",
        evidenceLabel: "证据基础",
        caveatLabel: "边界条件",
        exampleLabel: "参考实例",
        conclusionLabel: "关键结论",
        whyLabel: "对你意味着什么",
        refLabel: "Reference",
        footer: "内容每日更新，资料来源见各条 Reference。"
      },
      en: {
        htmlLang: "en",
        dateLocale: "en-AU",
        heroTitle: "Industry Briefing",
        heroDeck: "Current industry updates, structural-engineering career signals, and one cross-code classroom note.",
        liveTitle: "Live Updates",
        liveCount: "3 updates",
        insightTitle: "Professional Trend Insight",
        insightCount: "3 insights",
        classroomTitle: "Global Design Classroom",
        classroomLabel: "Engineering Comparison",
        comparisonLabel: "Comparison breakdown",
        takeawayLabel: "Design takeaway",
        watchLabel: "Watch next",
        evidenceLabel: "Evidence base",
        caveatLabel: "Boundary conditions",
        exampleLabel: "Worked reference",
        conclusionLabel: "Key conclusion",
        whyLabel: "Why it matters to you",
        refLabel: "Reference",
        footer: "Updated daily. Sources are listed under each Reference."
      }
    };

    const topicClass = {
      "AI": "ai",
      "Robotics": "robot",
      "机器人": "robot",
      "Semiconductors": "chip",
      "半导体": "chip",
      "Chips": "chip",
      "Cross-border E-commerce": "trade",
      "跨境电商": "trade",
      "Biomedicine": "bio",
      "生物医药": "bio",
      "Crypto": "crypto",
      "加密货币": "crypto"
    };

    let dailyData = fallback;
    let lang = localStorage.getItem("industryUpdatesLang") || "zh";

    function pick(value) {
      if (!value || typeof value === "string") return value || "";
      return value[lang] || value.zh || value.en || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeUrl(value) {
      try {
        const url = new URL(String(value || ""));
        return ["http:", "https:"].includes(url.protocol) ? url.href : "";
      } catch {
        return "";
      }
    }

    function renderFormula(equation) {
      if (!Array.isArray(equation.formulaTokens)) return escapeHtml(equation.formula || "");

      return equation.formulaTokens.map(token => {
        if (token.var !== undefined) {
          const variable = `<span class="math-var">${escapeHtml(token.var)}</span>`;
          const sub = token.sub !== undefined ? `<sub>${escapeHtml(token.sub)}</sub>` : "";
          const sup = token.sup !== undefined ? `<sup>${escapeHtml(token.sup)}</sup>` : "";
          return `${variable}${sub}${sup}`;
        }
        if (token.sub !== undefined) return `<sub>${escapeHtml(token.sub)}</sub>`;
        if (token.sup !== undefined) return `<sup>${escapeHtml(token.sup)}</sup>`;
        return escapeHtml(token.text || "");
      }).join("");
    }

    function renderReference(item) {
      const links = Array.isArray(item.referenceLinks) ? item.referenceLinks : [];
      const validLinks = links
        .map(link => ({ label: link.label || link.url, url: safeUrl(link.url) }))
        .filter(link => link.label && link.url);
      const fallbackText = item.reference || item.references || item.source || "";
      const content = validLinks.length
        ? validLinks.map(link => `<a class="ref-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label)}</a>`).join('<span class="ref-separator"> · </span>')
        : escapeHtml(fallbackText);

      return `<p class="ref"><span class="ref-label">${escapeHtml(copy[lang].refLabel)}:</span> <span class="ref-links">${content}</span></p>`;
    }

    async function loadData() {
      try {
        const response = await fetch("daily-data.json", { cache: "no-store" });
        if (!response.ok) throw new Error("Cannot load daily data");
        return await response.json();
      } catch {
        return fallback;
      }
    }

    function formatDate(value) {
      const date = new Date(`${value}T08:00:00`);
      return new Intl.DateTimeFormat(copy[lang].dateLocale, {
        month: "short",
        day: "numeric",
        weekday: "short"
      }).format(date);
    }

    function renderLive(items) {
      document.querySelector("#liveUpdates").innerHTML = items.map(item => {
        const topic = pick(item.topic);
        const body = [pick(item.summary), pick(item.watch)].filter(Boolean).join(" ");
        return `
          <div class="news-row">
            <span class="topic ${escapeHtml(topicClass[topic] || "chip")}">${escapeHtml(topic)}</span>
            <div>
              <p class="headline">${escapeHtml(pick(item.title || item.text))}</p>
              <p class="summary">${escapeHtml(body)}</p>
              ${renderReference(item)}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderInsights(items) {
      document.querySelector("#insights").innerHTML = items.map(item => {
        const body = [pick(item.summary), pick(item.caveat)].filter(Boolean).join(" ");
        return `
          <article class="insight-item">
            <p class="area">${escapeHtml(pick(item.area))}</p>
            <p class="signal">${escapeHtml(pick(item.title || item.signal))}</p>
            <p class="summary">${escapeHtml(body)}</p>
            ${renderReference(item)}
          </article>
        `;
      }).join("");
    }

    function renderClassroom(item) {
      const comparisonPoints = Array.isArray(item.comparisonPoints) ? item.comparisonPoints : [];
      const comparison = comparisonPoints.length ? `
        <p class="compare-title">${escapeHtml(copy[lang].comparisonLabel)}</p>
        <div class="compare-list">
          ${comparisonPoints.map(point => `
            <div class="compare-row">
              <p class="compare-key">${escapeHtml(pick(point.label))}</p>
              <p class="compare-copy">${escapeHtml(pick(point.text))}</p>
            </div>
          `).join("")}
        </div>
      ` : "";
      const takeaway = item.takeaway ? `
        <div class="design-takeaway">
          <p class="design-takeaway-label">${escapeHtml(copy[lang].takeawayLabel)}</p>
          <p class="design-takeaway-text">${escapeHtml(pick(item.takeaway))}</p>
        </div>
      ` : "";
      const example = item.example ? `
        <section class="example-block">
          <p class="class-label example-label">${escapeHtml(copy[lang].exampleLabel)}</p>
          <h4 class="example-title">${escapeHtml(pick(item.example.title))}</h4>
          <p class="example-intro">${escapeHtml(pick(item.example.intro))}</p>
          <div class="equation-list">
            ${(Array.isArray(item.example.equations) ? item.example.equations : []).map(equation => `
              <div class="equation-row">
                <p class="equation-key">${escapeHtml(pick(equation.label))}</p>
                <div class="equation-body">
                  <div class="equation-formula" role="math" aria-label="${escapeHtml(equation.formula)}">${renderFormula(equation)}</div>
                  ${equation.citation ? `<p class="equation-citation">${escapeHtml(pick(equation.citation))}</p>` : ""}
                  ${pick(equation.result) ? `<p class="equation-result">${escapeHtml(pick(equation.result))}</p>` : ""}
                </div>
              </div>
            `).join("")}
          </div>
          <div class="example-conclusion">
            <p class="example-conclusion-label">${escapeHtml(copy[lang].conclusionLabel)}</p>
            <p class="example-conclusion-text">${escapeHtml(pick(item.example.note))}</p>
          </div>
        </section>
      ` : "";

      document.querySelector("#classroom").innerHTML = `
        <p class="class-label">${escapeHtml(copy[lang].classroomLabel)}</p>
        <h3 class="class-title">${escapeHtml(pick(item.title))}</h3>
        <p class="class-text">${escapeHtml(pick(item.text))}</p>
        ${comparison}
        ${takeaway}
        ${example}
        ${renderReference(item)}
      `;
    }

    function setLanguage(nextLang) {
      lang = nextLang;
      localStorage.setItem("industryUpdatesLang", lang);
      document.documentElement.lang = copy[lang].htmlLang;
      document.querySelector("#langZh").classList.toggle("active", lang === "zh");
      document.querySelector("#langEn").classList.toggle("active", lang === "en");
      render();
    }

    function render() {
      document.querySelector("#today").textContent = formatDate(dailyData.date);
      document.querySelector("#edition").textContent = pick(dailyData.edition);
      document.querySelector("#heroTitle").textContent = copy[lang].heroTitle;
      document.querySelector("#heroDeck").textContent = copy[lang].heroDeck;
      document.querySelector("#liveTitle").textContent = copy[lang].liveTitle;
      document.querySelector("#liveCount").textContent = copy[lang].liveCount;
      document.querySelector("#insightTitle").textContent = copy[lang].insightTitle;
      document.querySelector("#insightCount").textContent = copy[lang].insightCount;
      document.querySelector("#classroomTitle").textContent = copy[lang].classroomTitle;
      document.querySelector("#footerNote").textContent = copy[lang].footer;
      renderLive(dailyData.liveUpdates || []);
      renderInsights(dailyData.insights || dailyData.technical || []);
      renderClassroom(dailyData.classroom || fallback.classroom);
    }

    document.querySelector("#langZh").addEventListener("click", () => setLanguage("zh"));
    document.querySelector("#langEn").addEventListener("click", () => setLanguage("en"));

    loadData().then(data => {
      dailyData = data;
      setLanguage(lang);
    });
  </script>
</body>
</html>
