<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Industry Updates</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fff8ed;
      --ink: #22303a;
      --muted: #67727a;
      --line: rgba(70, 88, 98, 0.16);
      --panel: rgba(255, 255, 255, 0.9);
      --mint: #9bdac8;
      --peach: #ffc8a8;
      --sky: #a9d8ff;
      --lemon: #ffe89a;
      --rose: #f7b7c8;
      --lavender: #cfc3ff;
      --shadow: 0 18px 42px rgba(76, 97, 112, 0.14);
      --soft-shadow: 0 10px 28px rgba(76, 97, 112, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans SC", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app {
      min-height: 100svh;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .phone {
      position: relative;
      width: min(100%, 520px);
      min-height: 100svh;
      background: linear-gradient(180deg, #fffaf1 0%, #f3fbff 44%, #fff7fb 100%);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 11px 14px 11px 18px;
      background: rgba(255, 250, 241, 0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      min-width: 0;
      font-size: 16px;
      font-weight: 780;
      line-height: 1;
    }

    .date {
      color: var(--muted);
      font-size: 11.5px;
      white-space: nowrap;
    }

    .lang-toggle {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      width: 74px;
      height: 30px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
    }

    .lang-toggle button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 11.5px;
      font-weight: 760;
      line-height: 1;
      cursor: pointer;
    }

    .lang-toggle button.active {
      background: var(--ink);
      color: white;
    }

    .hero {
      position: relative;
      min-height: 315px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      border-bottom: 1px solid var(--line);
      background: #d9f0ff;
    }

    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.82;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.2), rgba(117, 153, 171, 0.16) 44%, rgba(34, 48, 58, 0.5));
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      padding: 24px 20px 28px;
      color: white;
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.4);
    }

    .eyebrow {
      display: none;
    }

    h1 {
      margin: 0;
      max-width: 11ch;
      font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(38px, 10vw, 54px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .deck {
      display: none;
    }

    .watermark {
      position: absolute;
      right: 14px;
      bottom: 12px;
      z-index: 2;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.64);
      font-size: 10px;
      font-weight: 760;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(20, 30, 36, 0.22);
    }

    main {
      padding: 18px 12px 34px;
    }

    section {
      margin: 0 0 24px;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 12px;
    }

    h2 {
      margin: 0;
      font-size: 20.5px;
      line-height: 1.16;
      font-weight: 820;
      letter-spacing: 0;
    }

    .count {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid rgba(70, 88, 98, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
    }

    .lead-card {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .ticker {
      display: grid;
    }

    .news-row {
      min-height: 108px;
      display: block;
      padding: 16px 13px;
      border-bottom: 1px solid var(--line);
    }

    .news-row:last-child { border-bottom: 0; }

    .topic,
    .area,
    .class-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      color: #22303a;
      font-size: 11.5px;
      font-weight: 780;
      line-height: 1;
      white-space: nowrap;
    }

    .topic.ai { background: var(--mint); }
    .topic.robot { background: var(--sky); }
    .topic.chip { background: var(--lemon); }
    .topic.trade { background: var(--peach); }
    .topic.bio { background: var(--rose); }
    .topic.crypto { background: var(--lavender); }

    .headline {
      margin: 9px 0 0;
      font-size: 16.8px;
      line-height: 1.34;
      font-weight: 780;
    }

    .summary {
      margin: 8px 0 0;
      color: #3b4a54;
      font-size: 14.5px;
      line-height: 1.72;
      font-weight: 500;
    }

    .insight-list {
      display: grid;
      gap: 12px;
    }

    .insight-item,
    .classroom {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      padding: 16px 14px;
    }

    .area {
      margin: 0 0 9px;
      background: rgba(155, 218, 200, 0.46);
      color: #28745f;
      font-weight: 820;
    }

    .signal,
    .class-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.36;
      font-weight: 790;
    }

    .why {
      margin: 10px 0 0;
      padding: 10px 11px;
      border-radius: 8px;
      background: rgba(169, 216, 255, 0.22);
      color: #3b4a54;
      font-size: 13.8px;
      line-height: 1.62;
      font-weight: 500;
    }

    .ref {
      margin: 12px 0 0;
      padding-top: 9px;
      border-top: 1px solid rgba(70, 88, 98, 0.1);
      color: var(--muted);
      font-size: 11.2px;
      line-height: 1.48;
      font-weight: 520;
    }

    .ref-label {
      font-weight: 720;
    }

    .ref-links {
      display: inline;
    }

    .ref-link {
      color: #2d7081;
      text-decoration: underline;
      text-decoration-color: rgba(45, 112, 129, 0.34);
      text-underline-offset: 2px;
      overflow-wrap: anywhere;
    }

    .ref-link:hover,
    .ref-link:focus-visible {
      color: #15576a;
      text-decoration-color: currentColor;
    }

    .ref-separator {
      color: rgba(79, 95, 104, 0.52);
    }

    .classroom {
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--soft-shadow);
    }

    .class-label {
      margin: 0 0 9px;
      background: rgba(255, 232, 154, 0.6);
      color: #746124;
      font-weight: 820;
    }

    .class-title {
      color: var(--ink);
    }

    .class-text {
      margin: 8px 0 0;
      color: #3b4a54;
      font-size: 14.5px;
      line-height: 1.72;
      font-weight: 500;
    }

    html[lang="zh-CN"] .summary,
    html[lang="zh-CN"] .why,
    html[lang="zh-CN"] .class-text {
      text-align: justify;
      text-align-last: left;
      text-justify: inter-ideograph;
      word-break: normal;
      overflow-wrap: break-word;
    }

    html[lang="en"] .summary,
    html[lang="en"] .why,
    html[lang="en"] .class-text {
      text-align: justify;
      text-align-last: left;
      hyphens: none;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .footer-note {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 18px 22px;
    }

    .signature {
      margin: 0;
      padding: 0 18px 16px;
      text-align: center;
      color: rgba(22, 22, 22, 0.28);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 370px) {
      header {
        grid-template-columns: 1fr auto;
      }

      .date {
        display: none;
      }

      .news-row {
        padding-inline: 11px;
      }
    }

    @media (min-width: 780px) {
      .app {
        padding: 28px 0;
      }

      .phone {
        min-height: auto;
        border-radius: 18px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="phone">
      <header>
        <div class="brand">Industry Updates</div>
        <div class="date" id="today">Loading</div>
        <div class="lang-toggle" aria-label="Language switch">

          <button type="button" id="langEn">EN</button>
        </div>
      </header>

      <article class="hero">

        <div class="hero-copy">

          <p class="deck" id="heroDeck">实时行业消息、结构工程视角的职业洞察，以及一条跨规范课堂笔记。</p>
        </div>
        <div class="watermark">SConmyway</div>
      </article>

      <main>
        <section>
          <div class="section-head">
            <h2 id="liveTitle">实时消息</h2>
            <span class="count" id="liveCount">3 updates</span>
          </div>
          <div class="lead-card ticker" id="liveUpdates"></div>
        </section>

        <section>
          <div class="section-head">
            <h2 id="insightTitle">专业趋势洞察</h2>
            <span class="count" id="insightCount">3 insights</span>
          </div>
          <div class="insight-list" id="insights"></div>
        </section>

        <section>
          <div class="section-head">
            <h2 id="classroomTitle">每日知识课堂</h2>
          </div>
          <div class="classroom" id="classroom"></div>
        </section>
      </main>

      <p class="footer-note" id="footerNote">内容每日更新，资料来源见各条 Reference。</p>
      <p class="signature">SConmyway</p>
    </div>
  </div>

            },
            "text": {
                  "zh": "中国常见结构钢会用Q235、Q355这类牌号表示名义屈服强度，并且厚度变化会影响取值；澳大利亚常见板材和型钢常见Grade 250、300、350；美国建筑宽翼缘最常见的是ASTM A992，名义屈服强度约345 MPa；欧洲则常见S275、S355，并同样随厚度出现屈服强度调整。跨规范比较时，不能只把牌号里的数字直接当成“完全等价强度”，还要同时核对产品标准、厚度范围、韧性要求和对应设计规范中的抗力折减表达。",
                  "en": "Chinese structural steels often use grades such as Q235 and Q355, with yield values affected by thickness. Australia commonly uses Grade 250, 300, and 350 products, while the most common US wide-flange building steel is ASTM A992 with nominal yield strength of about 345 MPa. Europe often uses S275 and S355, again with thickness-related adjustments. When comparing across codes, do not treat grade numbers as perfectly equivalent strengths; check product standard, thickness range, toughness requirements, and the resistance format used in design."
            },
            "references": "GB/T 1591; AS/NZS 3678 and AS/NZS 3679.1; ASTM A992/A992M; EN 10025-2",
            "referenceLinks": [
                  {
                        "label": "China National Standard Information Service",
                        "url": "https://std.samr.gov.cn/"
                  },
                  {
                        "label": "Standards Australia catalogue",
                        "url": "https://www.standards.org.au/standards-catalogue"
                  },
                  {
                        "label": "ASTM A992/A992M",
                        "url": "https://www.astm.org/a0992_a0992m.html"
                  },
                  {
                        "label": "BSI catalogue: EN 10025-2",
                        "url": "https://knowledge.bsigroup.com/search?query=EN%2010025-2"
                  }
            ]
      }
};

    const copy = {
      zh: {
        htmlLang: "zh-CN",
        dateLocale: "zh-CN",
        heroTitle: "今日行业观察",
        heroDeck: "实时行业消息、结构工程视角的职业洞察，以及一条跨规范课堂笔记。",
        liveTitle: "实时消息",
        liveCount: "3 updates",
        insightTitle: "专业趋势洞察",
        insightCount: "3 insights",
        classroomTitle: "每日知识课堂",
        classroomLabel: "设计对比",
        whyLabel: "对你意味着什么",
        refLabel: "Reference",
        footer: "内容每日更新，资料来源见各条 Reference。"
      },
      en: {
        htmlLang: "en",
        dateLocale: "en-AU",
        heroTitle: "Industry Briefing",
        heroDeck: "Current industry updates, structural-engineering career signals, and one cross-code classroom note.",
        liveTitle: "Live Updates",
        liveCount: "3 updates",
        insightTitle: "Professional Trend Insight",
        insightCount: "3 insights",
        classroomTitle: "Daily Classroom",
        classroomLabel: "Design Note",
        whyLabel: "Why it matters to you",
        refLabel: "Reference",
        footer: "Updated daily. Sources are listed under each Reference."
      }
    };

    const topicClass = {
      "AI": "ai",
      "Robotics": "robot",
      "机器人": "robot",
      "Semiconductors": "chip",
      "半导体": "chip",
      "Chips": "chip",
      "Cross-border E-commerce": "trade",
      "跨境电商": "trade",
      "Biomedicine": "bio",
      "生物医药": "bio",
      "Crypto": "crypto",
      "加密货币": "crypto"
    };

    let dailyData = fallback;
    let lang = localStorage.getItem("industryUpdatesLang") || "zh";

    function pick(value) {
      if (!value || typeof value === "string") return value || "";
      return value[lang] || value.zh || value.en || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeUrl(value) {
      try {
        const url = new URL(String(value || ""));
        return ["http:", "https:"].includes(url.protocol) ? url.href : "";
      } catch {
        return "";
      }
    }

    function renderReference(item) {
      const links = Array.isArray(item.referenceLinks) ? item.referenceLinks : [];
      const validLinks = links
        .map(link => ({ label: link.label || link.url, url: safeUrl(link.url) }))
        .filter(link => link.label && link.url);
      const fallbackText = item.reference || item.references || item.source || "";
      const content = validLinks.length
        ? validLinks.map(link => `<a class="ref-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label)}</a>`).join('<span class="ref-separator"> · </span>')
        : escapeHtml(fallbackText);

      return `<p class="ref"><span class="ref-label">${escapeHtml(copy[lang].refLabel)}:</span> <span class="ref-links">${content}</span></p>`;
    }

    async function loadData() {
      try {
        const response = await fetch("daily-data.json", { cache: "no-store" });
        if (!response.ok) throw new Error("Cannot load daily data");
        return await response.json();
      } catch {
        return fallback;
      }
    }

    function formatDate(value) {
      const date = new Date(`${value}T08:00:00`);
      return new Intl.DateTimeFormat(copy[lang].dateLocale, {
        month: "short",
        day: "numeric",
        weekday: "short"
      }).format(date);
    }

    function renderLive(items) {
      document.querySelector("#liveUpdates").innerHTML = items.map(item => {
        const topic = pick(item.topic);
        return `
          <div class="news-row">
            <span class="topic ${escapeHtml(topicClass[topic] || "chip")}">${escapeHtml(topic)}</span>
            <div>
              <p class="headline">${escapeHtml(pick(item.title || item.text))}</p>
              <p class="summary">${escapeHtml(pick(item.summary))}</p>
              ${renderReference(item)}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderInsights(items) {
      document.querySelector("#insights").innerHTML = items.map(item => `
        <article class="insight-item">
          <p class="area">${escapeHtml(pick(item.area))}</p>
          <p class="signal">${escapeHtml(pick(item.title || item.signal))}</p>
          <p class="summary">${escapeHtml(pick(item.summary))}</p>
          <p class="why"><strong>${escapeHtml(copy[lang].whyLabel)}:</strong> ${escapeHtml(pick(item.why))}</p>
          ${renderReference(item)}
        </article>
      `).join("");
    }

    function renderClassroom(item) {
      document.querySelector("#classroom").innerHTML = `
        <p class="class-label">${escapeHtml(copy[lang].classroomLabel)}</p>
        <h3 class="class-title">${escapeHtml(pick(item.title))}</h3>
        <p class="class-text">${escapeHtml(pick(item.text))}</p>
        ${renderReference(item)}
      `;
    }

    function setLanguage(nextLang) {
      lang = nextLang;
      localStorage.setItem("industryUpdatesLang", lang);
      document.documentElement.lang = copy[lang].htmlLang;
      document.querySelector("#langZh").classList.toggle("active", lang === "zh");
      document.querySelector("#langEn").classList.toggle("active", lang === "en");
      render();
    }

    function render() {
      document.querySelector("#today").textContent = formatDate(dailyData.date);
      document.querySelector("#edition").textContent = pick(dailyData.edition);
      document.querySelector("#heroTitle").textContent = copy[lang].heroTitle;
      document.querySelector("#heroDeck").textContent = copy[lang].heroDeck;
      document.querySelector("#liveTitle").textContent = copy[lang].liveTitle;
      document.querySelector("#liveCount").textContent = copy[lang].liveCount;
      document.querySelector("#insightTitle").textContent = copy[lang].insightTitle;
      document.querySelector("#insightCount").textContent = copy[lang].insightCount;
      document.querySelector("#classroomTitle").textContent = copy[lang].classroomTitle;
      document.querySelector("#footerNote").textContent = copy[lang].footer;
      renderLive(dailyData.liveUpdates || []);
      renderInsights(dailyData.insights || dailyData.technical || []);
      renderClassroom(dailyData.classroom || fallback.classroom);
    }

    document.querySelector("#langZh").addEventListener("click", () => setLanguage("zh"));
    document.querySelector("#langEn").addEventListener("click", () => setLanguage("en"));

    loadData().then(data => {
      dailyData = data;
      setLanguage(lang);
    });
  </script>
</body>
</html>
